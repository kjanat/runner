<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>404 — runner</title>
		<meta name="robots" content="noindex">
		<meta name="theme-color" content="#f4ede1">
		<link rel="icon" href="/favicon.ico" type="image/svg+xml">
		<style>
		:root {
			color-scheme: light dark;
			--bg: #f4ede1;
			--ink: #0e0e0e;
			--dim: #5a5a52;
			--moss: #3d5a36;
			--tomato: #d94e2c;
			--term-fg: #e5e5e5;
			--term-dim: #888;
			--mono: ui-monospace, Menlo, Consolas, monospace;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #181613;
				--ink: #e8e1d2;
				--dim: #9a958c;
				--moss: #86a87a;
				--tomato: #ec6b48;
			}
		}
		*, *::before, *::after {
			box-sizing: border-box;
		}
		body {
			margin: 0;
			background: var(--bg);
			color: var(--ink);
			font-family: var(--mono);
			font-size: 16px;
			line-height: 1.55;
		}
		::selection {
			background: var(--ink);
			color: var(--bg);
		}
		main {
			max-width: 56ch;
			margin: 0 auto;
			padding: 4rem 1.5rem 6rem;
		}
		a {
			color: var(--moss);
			text-underline-offset: 0.18em;
		}
		a:hover {
			background: var(--moss);
			color: var(--bg);
		}
		.wordmark {
			font-size: clamp(3.25rem, 11vw, 6.5rem);
			line-height: 0.95;
			letter-spacing: -0.045em;
			margin: 0;
			font-weight: 700;
		}
		.wordmark::after {
			content: "_";
			color: var(--tomato);
		}
		.tagline {
			margin: 1.25rem 0 0;
			font-size: 1.0625rem;
			max-width: 52ch;
		}
		.term {
			background: #0a0a0a;
			color: var(--term-fg);
			border-radius: 4px;
			padding: 1.1rem 1.25rem 1.4rem;
			overflow-x: auto;
			font-size: 0.875rem;
			line-height: 1.55;
			margin: 2rem 0 0;
			white-space: pre;
		}
		.term .prompt::before {
			content: "$ ";
			color: var(--term-dim);
		}
		.term .dim {
			color: var(--term-dim);
		}
		.term .red {
			color: #ec6b48;
		}
		.meta {
			margin: 1.5rem 0 0;
			color: var(--dim);
			font-size: 0.9375rem;
		}
		.meta a {
			color: var(--ink);
		}
		@media (max-width: 40rem) {
			main {
				padding: 2.5rem 1.1rem 4rem;
			}
			.term {
				font-size: 0.78rem;
				padding: 0.9rem 1rem 1.1rem;
			}
		}
		</style>
	</head>
	<body>
		<main>
			<h1 class="wordmark">404</h1>
			<p class="tagline">
				No task or path by that name.
			</p>
			<pre class="term"><span class="prompt"></span>runner <span class="dim">&lt;requested-path&gt;</span>
<span class="red">error</span>: no task or path matched
<span class="dim">searched:</span> /</pre>
			<p class="meta">
				<a href="/">← back to runner</a>
			</p>
		</main>
	</body>
</html>
