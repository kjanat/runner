name: Setup runner
description: Install the runner / run CLI via cargo-binstall (prebuilt GitHub release binaries).
author: Kaj Kowalski
branding:
  icon: play
  color: blue

inputs:
  version:
    description: >-
      Crate version (e.g. `v0.10.0` / `0.10.0`) or `latest`. Defaults to
      the action's own ref, so `uses: kjanat/runner@v0.10.0` pins that
      version. Non-semver refs (e.g. `@master`) resolve to latest.
    required: false
    default: ""
  target:
    description: >-
      Rust target triple override (e.g. `x86_64-unknown-linux-musl`).
      Empty = auto-detect from the runner.
    required: false
    default: ""
  cache:
    description: Cache the installed binaries between runs.
    required: false
    default: "true"
  github-token:
    description: Token for cargo-binstall's GitHub API access (avoids rate limits).
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: Resolved release tag (e.g. `v0.10.0`).
    value: ${{ steps.resolve.outputs.tag }}
  target:
    description: Rust target triple installed.
    value: ${{ steps.resolve.outputs.triple }}
  bin-dir:
    description: Directory containing the installed binaries (also added to PATH).
    value: ${{ steps.resolve.outputs.dest }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_TARGET: ${{ inputs.target }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail

        # --- version: resolved by us, not scraped from binstall ---
        req="${INPUT_VERSION:-${ACTION_REF}}"
        if [[ "${req}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          tag="v${req#v}"
        else
          # latest/master/empty: follow the /releases/latest redirect.
          # No JSON, no token, no pipe (the curl-23 SIGPIPE bug class).
          url="$(curl -fsSLS -o /dev/null -w '%{url_effective}' \
                   --retry 5 --retry-all-errors --retry-delay 1 \
                   --connect-timeout 3 --max-time 8 \
                   https://github.com/kjanat/runner/releases/latest)"
          tag="${url##*/}"
          tag="${tag%%\?*}"
          if [[ ! "${tag}" =~ ^v[0-9] ]]; then
            echo "::error::failed to resolve latest runner-run release (got '${tag}')"
            exit 1
          fi
        fi

        # --- target: input override, else resolved from npm/targets.json
        # (the single source of truth shared with the release matrix and
        # npm packaging — no hand-maintained map to drift). ---
        triple="${INPUT_TARGET}"
        if [[ -z "${triple}" ]]; then
          case "${RUNNER_OS}" in
            Linux)   node_os=linux ;;
            macOS)   node_os=darwin ;;
            Windows) node_os=win32 ;;
            *)       node_os="" ;;
          esac
          case "${RUNNER_ARCH}" in
            X64)   node_cpu=x64 ;;
            ARM64) node_cpu=arm64 ;;
            ARM)   node_cpu=arm ;;
            X86)   node_cpu=ia32 ;;
            *)     node_cpu="" ;;
          esac
          triple="$(jq -r --arg os "${node_os}" --arg cpu "${node_cpu}" '
            [ .targets[]
              | select(.os|index($os)) | select(.cpu|index($cpu))
              | select((.libc == null) or (.libc|index("glibc")))
              | .rust ] | first // empty' "${GITHUB_ACTION_PATH}/npm/targets.json")"
          if [[ -z "${triple}" ]]; then
            echo "::error::No prebuilt target in npm/targets.json for ${RUNNER_OS}-${RUNNER_ARCH}; pass an explicit \`target\` input."
            exit 1
          fi
        fi

        dest="${RUNNER_TOOL_CACHE}/runner-run/${tag}/${triple}"

        {
          echo "tag=${tag}"
          echo "triple=${triple}"
          echo "dest=${dest}"
        } | tee -a "${GITHUB_OUTPUT}"

    - id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.resolve.outputs.dest }}
        key: runner-run-${{ steps.resolve.outputs.tag }}-${{ steps.resolve.outputs.triple }}

    - name: Install cargo-binstall
      if: steps.cache.outputs.cache-hit != 'true'
      uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

    - name: Install runner-run
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        TAG: ${{ steps.resolve.outputs.tag }}
        DEST: ${{ steps.resolve.outputs.dest }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        CARGO_BUILD_TARGET: ${{ steps.resolve.outputs.triple }}
        BINSTALL_NO_CONFIRM: "true"
        BINSTALL_DISABLE_STRATEGIES: compile # fail fast in CI; never silently build from source
      run: cargo-binstall "runner-run@${TAG#v}" --install-path "${DEST}"

    - name: Add to PATH
      shell: bash
      env: { DEST: "${{ steps.resolve.outputs.dest }}" }
      run: echo "${DEST}" >> "${GITHUB_PATH}"
