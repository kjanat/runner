name: Setup runner
description: Install the runner / run CLI via cargo-binstall (prebuilt GitHub release binaries).
author: Kaj Kowalski
branding:
  icon: play
  color: blue

inputs:
  version:
    description: >-
      Crate version (e.g. `v0.10.0` / `0.10.0`) or `latest`. Defaults to
      the action's own ref, so `uses: kjanat/runner@v0.10.0` pins that
      version. Non-semver refs (e.g. `@master`) resolve to latest.
    required: false
    default: ""
  target:
    description: >-
      Rust target triple override (e.g. `x86_64-unknown-linux-musl`).
      Empty = auto-detect from the runner.
    required: false
    default: ""
  cache:
    description: Cache the installed binaries between runs.
    required: false
    default: "true"
  github-token:
    description: Token for cargo-binstall's GitHub API access (avoids rate limits).
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: Resolved release tag (e.g. `v0.10.0`).
    value: ${{ steps.resolve.outputs.tag }}
  target:
    description: Rust target triple installed.
    value: ${{ steps.resolve.outputs.triple }}
  bin-dir:
    description: Directory containing the installed binaries (also added to PATH).
    value: ${{ steps.resolve.outputs.dest }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_TARGET: ${{ inputs.target }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "${ACTION_PATH}/.github/scripts/action/resolve.sh"

    - id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with: { path: "${{ steps.resolve.outputs.dest }}", key: "runner-run-${{ steps.resolve.outputs.tag }}-${{ steps.resolve.outputs.triple }}" }

    - name: Install cargo-binstall
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        BINSTALL_SHA: "aaa84a43aec4955a42c5ffc65d258961e39f276e" # v1.19.1
        BINSTALL_VERSION: "1.19.1"
        CARGO_HOME: ${{ steps.resolve.outputs.cbhome }} # controlled install dir
        ACTION_PATH: ${{ github.action_path }}
      run: bash "${ACTION_PATH}/.github/scripts/action/install-binstall.sh"

    - name: Install runner-run
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        TAG: ${{ steps.resolve.outputs.tag }}
        DEST: ${{ steps.resolve.outputs.dest }}
        CBIN: ${{ steps.resolve.outputs.cbhome }}/bin/cargo-binstall${{ steps.resolve.outputs.ext }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        CARGO_BUILD_TARGET: ${{ steps.resolve.outputs.triple }}
        BINSTALL_NO_CONFIRM: "true"
        BINSTALL_DISABLE_STRATEGIES: compile # fail fast in CI; never silently build from source
        ACTION_PATH: ${{ github.action_path }}
      run: bash "${ACTION_PATH}/.github/scripts/action/install-runner.sh"

    - name: Add to PATH
      shell: bash
      env: { DEST: "${{ steps.resolve.outputs.dest }}", ACTION_PATH: "${{ github.action_path }}" }
      run: bash "${ACTION_PATH}/.github/scripts/action/add-path.sh"

    - name: Verify
      shell: bash
      run: runner --version
