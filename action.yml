name: Setup runner cli
description: Install the runner / run CLI from npm (prebuilt, platform-resolved binaries).
author: Kaj Kowalski
branding: { icon: play, color: blue }

inputs:
  version: { description: "Tool version to install: `latest` (default), exact pin (`v?0.10.0`), or semver/tag (`1`, `0.10`, `v0.10`).", default: latest }

outputs:
  version: { description: "Concrete installed version (e.g. `0.10.0`), resolved post-install." }
  bin-dir: { description: npm global bin directory containing `runner` / `run` (added to PATH). }

runs:
  using: node24
  main: action.mjs
