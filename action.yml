name: Setup runner cli
description: Install the runner / run CLI from npm (prebuilt, platform-resolved binaries).
author: Kaj Kowalski
branding: { icon: play, color: blue }

inputs:
  version:
    description: "Version (e.g. `v0.10.0` / `0.10.0`) or `latest`. Defaults to the action's own ref, so `uses: kjanat/runner@v0.10.0` pins that version."
    default: latest
    required: false
outputs:
  version: { description: "Concrete installed version (e.g. `0.10.0`), resolved post-install.", value: "${{ steps.setup.outputs.version }}" }
  bin-dir: { description: npm global bin directory containing `runner` / `run` (added to PATH)., value: "${{ steps.setup.outputs.bin-dir }}" }

runs:
  using: composite
  steps:
    - id: setup
      uses: actions/github-script@v9
      env:
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
      with:
        script: |
          import { env } from 'node:process';
          const { default: run } = await import(`${env.GITHUB_ACTION_PATH}/action.mjs`)
          return await run({ github, context, core, exec, glob, io })

    - name: Verify
      shell: bash
      run: runner --version
