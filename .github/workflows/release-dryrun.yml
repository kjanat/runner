name: release-dryrun
run-name: >-
  ${{ format('release-dryrun {0}',
      case(inputs.target == 'all', 'full matrix', inputs.target)) }}

# Tag-free verification of the release build matrix. Mirrors release.yml's
# build paths but never creates a draft release, never uploads assets, and
# never touches a tag. Use this to iterate on BSD toolchain breakage
# without burning destructive tag/release operations on every attempt.

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target rust-triple to build, or `all`
        required: true
        default: all
        type: choice
        options:
          - all
          - aarch64-apple-darwin
          - aarch64-pc-windows-msvc
          - aarch64-unknown-freebsd
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - i686-pc-windows-msvc
          - x86_64-apple-darwin
          - x86_64-pc-windows-msvc
          - x86_64-unknown-freebsd
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - x86_64-unknown-netbsd

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  matrix:
    name: build matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs: { include: "${{ steps.gen.outputs.include }}" }
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: npm/targets.json
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: gen
        # Same single-source-of-truth as release.yml. Adds an inputs.target
        # filter so a user can dispatch a single target without spinning the
        # entire matrix. `vm`-typed targets are excluded here for the same
        # reason as release.yml — they need a dedicated VM-driven job.
        env: { INPUT_TARGET: "${{ inputs.target }}" }
        run: |
          include=$(
            jq -c --arg t "${INPUT_TARGET}" \
              '[.targets[]
                | select(.build != "vm")
                | select($t == "all" or .rust == $t)
                | {
                    target: .rust,
                    runner: .runner,
                    "build-tool": .build,
                    experimental: (.experimental // false)
                  }]' npm/targets.json
            )
          echo "include=${include}" >> "${GITHUB_OUTPUT}"

  build:
    name: dryrun ${{ matrix.target }}
    needs: matrix
    if: needs.matrix.outputs.include != '[]'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: { include: "${{ fromJSON(needs.matrix.outputs.include) }}" }
    steps:
      - uses: actions/checkout@v6

      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@nightly
        with: { components: rust-src }

      - name: setup cross toolchain
        if: contains(fromJSON('["cargo-cross-toolchain", "cargo-build-std"]'), matrix.build-tool)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with: { target: "${{ matrix.target }}" }

      # `dry-run: true` builds + compresses but skips the GitHub release
      # upload entirely — perfect for verifying the build matrix without
      # creating release artifacts.
      - name: build (taiki-e dry-run)
        if: contains(fromJSON('["cargo", "cross", "cargo-cross-toolchain"]'), matrix.build-tool)
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          token: ${{ github.token }}
          bin: runner,run
          target: ${{ matrix.target }}
          build-tool: ${{ case(matrix.build-tool == 'cargo-cross-toolchain', 'cargo', matrix.build-tool) }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true
          dry-run: true

      # cargo-build-std has no upload action involvement — the manual cargo
      # invocation IS the verification. Confirm the binaries materialized
      # at the expected path.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
          CARGO_UNSTABLE_BUILD_STD: std,panic_abort
        run: cargo +nightly build --release --locked

      - name: verify cargo-build-std artifacts
        if: matrix.build-tool == 'cargo-build-std'
        env: { target: "${{ matrix.target }}" }
        run: |
          set -euo pipefail
          for bin in runner run; do
            path="target/${target}/release/${bin}"
            if [[ ! -f "${path}" ]]; then
              echo "error: ${path} missing" >&2
              exit 1
            fi
            file "${path}"
          done
