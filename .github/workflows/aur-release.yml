name: aur-release
run-name: ${{ format('aur publish {0}', case(github.event_name == 'release', github.event.release.tag_name, inputs.tag)) }}

on:
  release: { types: [published] }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. v0.12.1), required: true, type: string }
      dry-run: { description: Prepare + validate PKGBUILDs but do not push to AUR, required: true, default: false, type: boolean }

permissions: { contents: read }
env: { RELEASE_TAG: "${{ case(github.event_name == 'release', github.event.release.tag_name, inputs.tag) }}" }

jobs:
  publish:
    name: publish ${{ matrix.pkgname }}
    runs-on: ubuntu-latest
    # Serialize per-pkg so dispatch + release-published can't race the AUR push.
    concurrency: { group: "aur-publish-${{ matrix.pkgname }}", cancel-in-progress: false }
    strategy: { fail-fast: false, matrix: { pkgname: [runner-run, runner-run-bin] } }
    environment: { name: aur, url: "https://aur.archlinux.org/packages/${{ matrix.pkgname }}" }
    steps:
      # Checkout from default branch — no tag/branch-supplied code on disk,
      # matching npm-release.yml. aur.mjs and PKGBUILDs come from master.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { ref: "${{ github.event.repository.default_branch }}", persist-credentials: false }

      - name: prepare PKGBUILD
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env: { PKGNAME: "${{ matrix.pkgname }}" }
        with:
          script: |
            const { default: prepareAurPkgbuild } = await import("${{ github.workspace }}/.github/scripts/publish/aur.mjs");
            await prepareAurPkgbuild({ core, github, context });

      - name: publish to AUR
        if: inputs.dry-run != 'true'
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: aur/${{ matrix.pkgname }}/PKGBUILD
          commit_username: Kaj Kowalski
          commit_email: info@kajkowalski.nl
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ env.RELEASE_TAG }}
          # -bin already has per-arch sums injected by aur.mjs.
          updpkgsums: ${{ matrix.pkgname == 'runner-run' }}
