name: npm-release
run-name: ${{ format('npm publish {0}', case(github.event_name == 'release', github.event.release.tag_name, inputs.tag)) }}

on:
  workflow_call: { inputs: { tag: { required: true, type: string }, run-id: { required: true, type: string } } }
  release: { types: [published] }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. v0.5.0), required: true, type: string }
      run-id:
        description: |-
          release.yml run ID that produced the dist artifact for this tag.
          Find it via `gh run list --workflow=release.yml --branch=<tag> --status=success`.
        required: true
        type: string
      dist-tag:
        description: |-
          npm dist-tag (latest, next, etc.).
          Leave empty to infer from the tag (prerelease → next, otherwise → latest).
        required: false
        options: [latest, next]
        type: choice
      dry-run: { description: Dry run only, required: true, default: false, type: boolean }

permissions: { contents: read }

env:
  REGISTRY: https://registry.npmjs.org/
  # Trusted trigger metadata only.
  RELEASE_TAG: ${{ case(github.event_name == 'release', github.event.release.tag_name, inputs.tag) }}
  EVENT_NAME: ${{ github.event_name }}
  INPUT_DIST_TAG: ${{ inputs.dist-tag }}
  INPUT_DRY_RUN: ${{ inputs.dry-run || false }}

jobs:
  setup:
    name: verify dist
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag, 'v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
    permissions: { contents: read, actions: read }
    outputs:
      run-id: ${{ steps.resolve.outputs.run-id }}
      dist-tag: ${{ steps.derive.outputs.dist-tag }}
      dry-run: ${{ steps.derive.outputs.dry-run }}
      platforms: ${{ steps.matrix.outputs.platforms }}
      facade: ${{ steps.matrix.outputs.facade }}
    steps:
      # Sparse-checkout from default branch — no tag-supplied code on disk.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: ".github/scripts\nnpm/targets.json"
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v6
        with: { registry-url: "${{ env.REGISTRY }}" }

      - name: resolve build run-id
        id: resolve
        env: { GH_TOKEN: "${{ github.token }}", INPUT_RUN_ID: "${{ inputs.run-id }}" }
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_RUN_ID}" ]]; then
            run_id="${INPUT_RUN_ID}"
          else
            run_id=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow=release.yml \
              --branch="${RELEASE_TAG}" \
              --status=success \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "error: no run-id resolvable for ${RELEASE_TAG}" >&2
            exit 1
          fi
          # Numeric guard — blocks GITHUB_OUTPUT injection.
          if ! [[ "${run_id}" =~ ^[0-9]+$ ]]; then
            echo "error: run-id '${run_id}' is not a positive integer" >&2
            exit 1
          fi
          echo "run-id=${run_id}" >> "${GITHUB_OUTPUT}"

      - name: download dist artifact
        uses: actions/download-artifact@v8
        with: { name: dist, path: npm/, run-id: "${{ steps.resolve.outputs.run-id }}", github-token: "${{ github.token }}" }

      - name: extract dist
        run: tar -xf npm/dist.tar -C npm && rm npm/dist.tar

      # Execute what will be published; build-dist's smoke test runs
      # before the artifact handoff and can't see what it breaks.
      - name: smoke-test dist artifact
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/publish/smoke-npm-artifact.sh"

      - name: derive dist-tag and dry-run
        id: derive
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/derive-dist-dry.sh"

      - name: generate publish matrix
        id: matrix
        run: |
          set -euo pipefail
          {
            echo "platforms=$(jq -c '[.targets[] | {pkg: .pkg, experimental: (.experimental // false)}]' npm/targets.json)"
            echo "facade=$(jq -r '.facade' npm/targets.json)"
          } | tee -a "${GITHUB_OUTPUT}"

  publish:
    name: publish ${{ matrix.pkg }}
    needs: setup
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write, actions: read }
    environment: { name: npm, url: "${{ steps.publish.outputs.package-url }}" }
    strategy: { fail-fast: false, matrix: { include: "${{ fromJSON(needs.setup.outputs.platforms) }}" } }
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: ".github/scripts\nnpm/targets.json"
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v6
        with: { registry-url: "${{ env.REGISTRY }}" }

      - name: download dist artifact
        uses: actions/download-artifact@v8
        with: { name: dist, path: npm/, run-id: "${{ needs.setup.outputs.run-id }}", github-token: "${{ github.token }}" }

      - name: extract dist
        run: tar -xf npm/dist.tar -C npm && rm npm/dist.tar

      - name: publish to npm
        id: publish
        env:
          DIST_TAG: ${{ needs.setup.outputs.dist-tag }}
          DRY_RUN: ${{ needs.setup.outputs.dry-run }}
          ONLY_PACKAGE: ${{ matrix.pkg }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/publish/npm.sh"

  # Facade last so its optionalDependencies resolve on install.
  publish-facade:
    name: publish ${{ needs.setup.outputs.facade }}
    needs: [setup, publish]
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write, actions: read }
    environment: { name: npm, url: "${{ steps.publish.outputs.package-url }}" }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: ".github/scripts\nnpm/targets.json"
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v6
        with: { registry-url: "${{ env.REGISTRY }}" }

      - name: download dist artifact
        uses: actions/download-artifact@v8
        with: { name: dist, path: npm/, run-id: "${{ needs.setup.outputs.run-id }}", github-token: "${{ github.token }}" }

      - name: extract dist
        run: tar -xf npm/dist.tar -C npm && rm npm/dist.tar

      - name: publish to npm
        id: publish
        env:
          DIST_TAG: ${{ needs.setup.outputs.dist-tag }}
          DRY_RUN: ${{ needs.setup.outputs.dry-run }}
          ONLY_PACKAGE: ${{ needs.setup.outputs.facade }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/publish/npm.sh"
