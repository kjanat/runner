name: npm-release
run-name: >-
  ${{ format('npm publish {0}',
    	case(
      	contains(github.event_name, 'workflow_run'),
      	github.event.workflow_run.head_branch,
      	inputs.tag)
    	) }}

on:
  release: { types: [published] }
  # todo: explore
  # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#using-data-from-the-triggering-workflow
  workflow_run: { workflows: [release], types: [completed], branches: [v*] }
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.5.0)
        required: true
        type: string
      run-id:
        description: |-
          release.yml run ID that produced the npm-dist artifact for this tag.
          Find it via `gh run list --workflow=release.yml --branch=<tag> --status=success`.
        required: true
        type: string
      dist-tag:
        description: |-
          npm dist-tag (latest, next, etc.).
          Leave empty to infer from the tag (prerelease → next, otherwise → latest).
        required: false
        options: [latest, next]
        type: choice
      dry-run:
        description: Dry run only
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: latest
  REGISTRY: https://registry.npmjs.org/
  RELEASE_TAG: ${{ case(contains(github.event_name, 'workflow_dispatch'), inputs.tag, github.event.workflow_run.head_branch) }}
  RUN_ID: ${{ case(contains(github.event_name, 'workflow_dispatch'), inputs.run-id, github.event.workflow_run.id) }}
  EVENT_NAME: ${{ github.event_name }}
  INPUT_DIST_TAG: ${{ inputs.dist-tag }}
  INPUT_DRY_RUN: ${{ inputs.dry-run || false }}

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    # Only run after a successful tag-triggered release.yml, or on manual dispatch.
    if: >-
      contains(github.event_name, 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      id-token: write # for npm provenance
      actions: read # for cross-workflow artifact download
    environment: { name: npm, url: "${{ steps.publish.outputs.package-url }}" }
    # env:
    # RELEASE_TAG comes from trusted trigger metadata only — never from
    # anything build-time scripts could influence.
    #   RELEASE_TAG: ${{ case(contains(github.event_name, 'workflow_dispatch'), inputs.tag, github.event.workflow_run.head_branch) }}
    #   RUN_ID: ${{ case(contains(github.event_name, 'workflow_dispatch'), inputs.run-id, github.event.workflow_run.id) }}
    #   EVENT_NAME: ${{ github.event_name }}
    #   INPUT_DIST_TAG: ${{ inputs.dist-tag || '' }}
    #   INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
    # ---
    # Hardcoded registry — every npm view/publish call passes this
    # explicitly via --registry so any per-package config that slipped
    # past the rejection checks couldn't redirect the publish.
    #   REGISTRY: https://registry.npmjs.org/
    steps:
      # Sparse-checkout from the DEFAULT BRANCH gets us the trusted publish
      # scripts only. No tag-supplied code on disk → no untrusted code
      # execution → no cache-poisoning vector.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: |
            .github/scripts
            npm/targets.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY }}

      # Cross-workflow artifact download: the npm-dist was built by the
      # release.yml run identified by RUN_ID (in tag-push context, where
      # cache scope is the tag — not the default branch).
      - name: download npm-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-dist
          path: npm/dist/
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ github.token }}

      - name: derive dist-tag and dry-run
        id: derive
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/derive-dist-dry.sh"

      - name: publish to npm
        id: publish
        env:
          DIST_TAG: ${{ steps.derive.outputs.dist-tag }}
          DRY_RUN: ${{ steps.derive.outputs.dry-run }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/publish/npm.sh"
