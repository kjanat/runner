name: npm-release
run-name: >-
  ${{ github.event_name == 'workflow_run'
      && format('npm publish {0}', github.event.workflow_run.head_branch)
      || format('npm publish {0}', github.ref_name) }}

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.5.0)
        required: true
      dist-tag:
        description: npm dist-tag (latest, next, etc.). Leave empty to infer from the tag (prerelease → next, otherwise → latest).
        required: false
      dry-run:
        description: Dry run only
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  build:
    name: build npm packages
    runs-on: ubuntu-latest
    # Only run after a successful tag-triggered release.yml, or on manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
    env:
      RELEASE_TAG: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.tag
            || github.event.workflow_run.head_branch }}
      RELEASE_SHA: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.tag
            || github.event.workflow_run.head_sha }}
    outputs:
      dist-tag: ${{ steps.derive.outputs.dist-tag }}
      dry-run: ${{ steps.derive.outputs.dry-run }}
    steps:
      # Tag-supplied code is treated as untrusted in this job: no NPM_TOKEN, no
      # id-token, no persistent git credentials. Anything malicious in the
      # tag's scripts is contained to manipulating the artifact contents,
      # which the privileged publish job re-validates before publishing.
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: derive dist-tag and dry-run
        id: derive
        env:
          INPUT_DIST_TAG: ${{ inputs.dist-tag || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "${INPUT_DIST_TAG}" ]; then
            # Manual override always wins.
            dist_tag="${INPUT_DIST_TAG}"
          else
            # Infer from the tag: prerelease (e.g. v1.0.0-rc.1) → next, else latest.
            case "${RELEASE_TAG}" in
              *-*) dist_tag=next ;;
              *)   dist_tag=latest ;;
            esac
          fi
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            dry_run="${INPUT_DRY_RUN}"
          else
            dry_run=false
          fi
          echo "dist-tag=${dist_tag}" >> "$GITHUB_OUTPUT"
          echo "dry-run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p npm/downloads
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern 'runner-*-*.tar.gz' \
            --pattern 'runner-*-*.sha256' \
            --dir npm/downloads
          ls -la npm/downloads

      - name: verify checksums
        working-directory: npm/downloads
        run: |
          set -euo pipefail
          shopt -s nullglob

          tarballs=(*.tar.gz)
          sums=(*.sha256)

          # Refuse to proceed unless every tarball has a matching .sha256 and
          # every .sha256 has a matching tarball — otherwise an unchecksummed
          # binary could slip through to publish.
          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "error: no tarballs downloaded for ${RELEASE_TAG}" >&2
            exit 1
          fi
          for t in "${tarballs[@]}"; do
            expected="${t%.tar.gz}.sha256"
            if [ ! -f "${expected}" ]; then
              echo "error: tarball ${t} has no matching ${expected}" >&2
              exit 1
            fi
          done

          # Verify each .sha256 references a tarball whose name matches its
          # own basename — defends against a release where foo.sha256 was
          # swapped to reference bar.tar.gz, which would leave foo.tar.gz
          # unchecked while sha256sum -c silently re-verifies bar.
          for s in "${sums[@]}"; do
            inner=$(awk '{sub(/^\*/, "", $2); print $2}' "${s}")
            expected="${s%.sha256}.tar.gz"
            if [ ! -f "${expected}" ]; then
              echo "error: checksum file ${s} has no matching ${expected}" >&2
              exit 1
            fi
            if [ "${inner}" != "${expected}" ]; then
              echo "error: ${s} references '${inner}', expected '${expected}'" >&2
              exit 1
            fi
          done

          for sum in "${sums[@]}"; do
            sha256sum -c --status "${sum}"
          done

      - name: build npm packages
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          version="${RELEASE_TAG#v}"
          # build-packages.mjs is tier-aware: tier-3 (experimental) targets
          # are silently skipped when missing, tier 1/2 fail the job. Manual
          # backfills (workflow_dispatch) extend that leniency to every tier
          # via --skip-missing.
          args=(npm/scripts/build-packages.mjs --version "${version}")
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            args+=(--skip-missing)
          fi
          node "${args[@]}"

      - name: upload npm/dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-dist
          path: npm/dist/
          retention-days: 1
          if-no-files-found: error

  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write  # for npm provenance
    env:
      # RELEASE_TAG is recomputed here (not consumed from build job outputs) so
      # the value comes straight from trigger metadata — never from anything an
      # untrusted build step could influence.
      RELEASE_TAG: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.tag
            || github.event.workflow_run.head_branch }}
      EVENT_NAME: ${{ github.event_name }}
      DIST_TAG: ${{ needs.build.outputs.dist-tag }}
      DRY_RUN: ${{ needs.build.outputs.dry-run }}
      # Hardcoded registry — every npm view/publish call below passes this
      # explicitly via --registry so any per-package config that did slip
      # past the rejection checks couldn't redirect the publish.
      REGISTRY: https://registry.npmjs.org/
    steps:
      # Note: deliberately no actions/checkout — keeps tag-supplied code out of
      # this job's filesystem. The only thing on disk is the artifact produced
      # by the build job (a tree of generated package directories) and Node.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: download npm/dist artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-dist
          path: npm/dist/

      - name: publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # The artifact is produced by the unprivileged build job from
          # tag-supplied scripts and must be treated as untrusted. Three
          # defenses run here before NPM_TOKEN is used:
          #   1. Hardcoded allowlist of expected directory names — a malicious
          #      build cannot smuggle extra package directories.
          #   2. Each package.json's `name` field must equal the expected
          #      scope/key — prevents republishing as an unexpected package.
          #   3. Each package.json's `version` field must equal the version
          #      derived from the trigger tag (trusted metadata) — prevents
          #      stamping arbitrary versions onto allowed packages.
          # Lists must be kept in sync with npm/targets.json. Tier-3 entries
          # (release.yml's `experimental: true`) may legitimately be missing
          # because their build job uses `continue-on-error`. Tier-1/2 are
          # mandatory for release-triggered runs; for manual workflow_dispatch
          # backfills (which run build with --skip-missing) we relax this so
          # missing tier-1/2 packages are skipped instead of aborting. The
          # façade itself remains mandatory either way.
          FACADE="runner-run"
          SCOPE="@runner-run"
          REQUIRED_PLATFORMS=(
            linux-x64-gnu
            linux-x64-musl
            linux-arm64-gnu
            linux-arm64-musl
            linux-armv7-gnueabihf
            darwin-x64
            darwin-arm64
            win32-x64-msvc
            win32-arm64-msvc
            win32-ia32-msvc
            freebsd-x64
          )
          OPTIONAL_PLATFORMS=(
            freebsd-arm64
            netbsd-x64
            openbsd-x64
          )
          EXPECTED_VERSION="${RELEASE_TAG#v}"

          # Refuse to proceed if the artifact contains anything outside the
          # allowlist — that's either a misconfiguration or an attack.
          allowed_set=" ${FACADE} ${REQUIRED_PLATFORMS[*]} ${OPTIONAL_PLATFORMS[*]} "
          for dir in npm/dist/*/; do
            base=$(basename "${dir%/}")
            if [[ "${allowed_set}" != *" ${base} "* ]]; then
              echo "error: artifact contains unexpected directory '${base}' (not in allowlist)" >&2
              exit 1
            fi
          done

          publish_allowed() {
            local dir="$1" expected_name="$2" required="$3"
            local actual_name version published

            if [ ! -d "${dir}" ]; then
              if [ "${required}" = "true" ]; then
                echo "error: required package ${expected_name} missing from artifact" >&2
                exit 1
              fi
              echo "skip ${expected_name}: not in artifact (optional / experimental platform)"
              return 0
            fi
            if [ ! -f "${dir}/package.json" ]; then
              echo "error: ${dir}/package.json missing" >&2
              exit 1
            fi

            # Reject per-package registry overrides. A malicious build could
            # drop a .npmrc or set publishConfig in package.json to redirect
            # the publish (and NPM_TOKEN) to an attacker-controlled registry.
            # CLI --registry does NOT override scoped publishConfig.registry,
            # so the rejection here is the primary defense; the explicit
            # --registry flag below is belt-and-suspenders for non-scoped
            # overrides.
            if [ -e "${dir}/.npmrc" ]; then
              echo "error: ${dir}/.npmrc is forbidden (could redirect publish)" >&2
              exit 1
            fi
            if jq -e 'has("publishConfig")' "${dir}/package.json" >/dev/null; then
              echo "error: ${dir}/package.json has publishConfig (could redirect publish)" >&2
              exit 1
            fi

            actual_name=$(jq -r .name "${dir}/package.json")
            if [ "${actual_name}" != "${expected_name}" ]; then
              echo "error: ${dir}/package.json declares name '${actual_name}', expected '${expected_name}'" >&2
              exit 1
            fi
            version=$(jq -r .version "${dir}/package.json")
            if [ "${version}" != "${EXPECTED_VERSION}" ]; then
              echo "error: ${dir}/package.json declares version '${version}', expected '${EXPECTED_VERSION}' (from tag ${RELEASE_TAG})" >&2
              exit 1
            fi

            # Skip if already published — npm versions are immutable, so reruns
            # after a partial publish would otherwise fail on the first
            # sub-package that already published.
            published=$(npm view "${actual_name}@${version}" --registry "${REGISTRY}" version 2>/dev/null || true)
            if [ "${published}" = "${version}" ]; then
              echo "skip ${actual_name}@${version}: already published"
              return 0
            fi

            local args=(publish --registry "${REGISTRY}" --access public --tag "${DIST_TAG}" --ignore-scripts --provenance)
            if [ "${DRY_RUN}" = "true" ]; then args+=(--dry-run); fi
            echo "+ npm ${args[*]}  (cwd: ${dir})"
            # Tolerate the TOCTOU race between the npm view check above and
            # this publish: if another actor publishes the same version in
            # the gap, npm exits with EPUBLISHCONFLICT and we treat that as a
            # no-op (mirrors npm/scripts/publish.mjs).
            #
            # The `|| status=$?` form is required: under `set -e`,
            # `output=$(cmd); status=$?` would exit on a failing cmd before
            # status was captured, and `if ! output=$(cmd); then status=$?`
            # captures the negation status (always 0), not npm's real exit
            # code — silently masking real publish failures.
            local output status=0
            output=$(cd "${dir}" && npm "${args[@]}" 2>&1) || status=$?
            if [ "${status}" -ne 0 ]; then
              printf '%s\n' "${output}" >&2
              if grep -Eiq 'EPUBLISHCONFLICT|cannot publish over the previously published versions' <<<"${output}"; then
                echo "skip ${actual_name}@${version}: already published (race with concurrent publisher)"
                return 0
              fi
              return "${status}"
            fi
            printf '%s\n' "${output}"
          }

          # On manual backfills (workflow_dispatch + --skip-missing in build),
          # treat tier-1/2 as optional too — the user explicitly opted into a
          # partial publish. The façade stays mandatory regardless.
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tier12_required=false
          else
            tier12_required=true
          fi

          # Sub-packages first so the façade's optionalDependencies resolve on install.
          for platform in "${REQUIRED_PLATFORMS[@]}"; do
            publish_allowed "npm/dist/${platform}" "${SCOPE}/${platform}" "${tier12_required}"
          done
          for platform in "${OPTIONAL_PLATFORMS[@]}"; do
            publish_allowed "npm/dist/${platform}" "${SCOPE}/${platform}" false
          done

          # Façade is mandatory either way — no point publishing a half-empty
          # set of platform packages with no entry point.
          publish_allowed "npm/dist/${FACADE}" "${FACADE}" true
