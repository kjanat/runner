name: npm-release
run-name: ${{ format('npm publish {0}', case(github.event_name == 'release', github.event.release.tag_name, inputs.tag)) }}

on:
  release: { types: [published] }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. v0.5.0), required: true, type: string }
      run-id:
        description: |-
          release.yml run ID that produced the npm-dist artifact for this tag.
          Find it via `gh run list --workflow=release.yml --branch=<tag> --status=success`.
        required: true
        type: string
      dist-tag:
        description: |-
          npm dist-tag (latest, next, etc.).
          Leave empty to infer from the tag (prerelease → next, otherwise → latest).
        required: false
        options: [latest, next]
        type: choice
      dry-run: { description: Dry run only, required: true, default: false, type: boolean }

permissions: { contents: read }

env:
  RELEASE_TAG: ${{ case(github.event_name == 'release', github.event.release.tag_name, inputs.tag) }}

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
    permissions: { contents: read, id-token: write, actions: read }
    environment: { name: npm, url: "${{ steps.publish.outputs.package-url }}" }
    outputs: { dry-run: "${{ steps.derive.outputs.dry-run }}" }
    steps:
      # Sparse-checkout from default branch — no tag-supplied code on disk.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: |
            .github/scripts
            npm/targets.json
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version-file: .node-version, registry-url: https://registry.npmjs.org/ }

      # release.yml may self-dispatch this workflow before GitHub has marked
      # that run successful; wait here before downloading its artifact.
      - name: resolve build run-id
        id: resolve
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          retries: 3
          script: |
            const { resolveReleaseRun } = await import("${{ github.workspace }}/.github/scripts/publish/npm.mjs");
            await resolveReleaseRun({ core, github, context });

      - name: download npm-dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: npm-dist, path: npm/dist/, run-id: "${{ steps.resolve.outputs.run-id }}" }

      - name: derive dist-tag and dry-run
        id: derive
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { deriveNpmPublishSettings } = await import("${{ github.workspace }}/.github/scripts/publish/npm.mjs");
            await deriveNpmPublishSettings({ core, context });

      - name: publish to npm
        id: publish
        env:
          INPUT_DERIVE_OUTPUTS: ${{ toJSON(steps.derive.outputs) }}
          INPUT_WORKFLOW_ENV: ${{ toJSON(env) }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: publishNpmPackages } = await import("${{ github.workspace }}/.github/scripts/publish/npm.mjs");
            await publishNpmPackages({ core, exec });
