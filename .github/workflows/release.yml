name: release
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('verify PR #{0}', github.event.pull_request.number)
      || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      && format('release {0}', github.ref_name)
      || format('verify {0}', github.ref_name) }}

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D clippy::all

      - name: cargo test
        run: cargo test

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: create github release
        uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          changelog: CHANGELOG.md
          draft: true
          branch: master

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (Tier 1)
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            build-tool: cross
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            build-tool: cross
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            build-tool: cross
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            build-tool: cross
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            build-tool: cross
          # macOS (Tier 1)
          - target: x86_64-apple-darwin
            runner: macos-13
            build-tool: cargo
          - target: aarch64-apple-darwin
            runner: macos-latest
            build-tool: cargo
          # Windows (Tier 1 / 2)
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            build-tool: cargo
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            build-tool: cargo
          - target: i686-pc-windows-msvc
            runner: windows-latest
            build-tool: cargo
          # FreeBSD (Tier 2 / 3)
          - target: x86_64-unknown-freebsd
            runner: ubuntu-latest
            build-tool: cross
          - target: aarch64-unknown-freebsd
            runner: ubuntu-latest
            build-tool: cross
            experimental: true
          # NetBSD / OpenBSD (Tier 2 / 3, best effort)
          - target: x86_64-unknown-netbsd
            runner: ubuntu-latest
            build-tool: cross
            experimental: true
          - target: x86_64-unknown-openbsd
            runner: ubuntu-latest
            build-tool: cross
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v6

      - name: build and upload binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bin: runner,run
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true
