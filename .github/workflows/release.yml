name: release
run-name: "${{ case(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'), format('release {0}', github.ref_name), github.event_name == 'pull_request', format('verify PR #{0}', github.event.pull_request.number), format('verify {0}', github.ref_name)) }}"
on: { pull_request: null, push: { branches: [master], tags: [v*] } }
permissions: { contents: read }
env: { CARGO_TERM_COLOR: always }

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    env:
      MISE: '{"tools": {"node": "lts", "bun": "latest", "deno": "latest", "go": "latest", "poetry": "latest", "pipenv": "latest", "task": "latest", "pnpm": "latest", "yarn": "latest", "npm:turbo": "latest", "npm:nx": "latest"}}'
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { save-if: "${{ github.event_name != 'pull_request' }}" }
      # dprint's rustfmt exec formatter installs a nightly toolchain via its
      # setupCommand; cold that costs ~4min/run. Cache the toolchain + dprint's
      # plugin/setup state so it installs once. restore-keys serves a slightly
      # stale nightly on config change rather than reinstalling from scratch.
      - uses: actions/cache@v6
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.cache/dprint
          key: fmt-tools-${{ runner.os }}-${{ hashFiles('.dprint.jsonc', 'rustfmt.toml', '.cargo/config.toml') }}
          restore-keys: fmt-tools-${{ runner.os }}-
      # Install every tool runner / package manager we claim to support, so tests
      # exercise the real CLI paths instead of only the file-parse fallbacks.
      # Rust/CLI tools come as prebuilt binaries via taiki-e/install-action; the
      # polyglot runtimes via mise. make, node/npm, go, ruby+bundler and
      # php+composer already ship on the ubuntu-latest image; cargo from the
      # toolchain above.
      - uses: taiki-e/install-action@v2
        with: { tool: "just,uv,bacon,tombi,dprint" }
      - run: printf 'MISE_TOML<<TOML\n%s\nTOML\n' "$(yq -o toml -p json <<<"$MISE" | dprint fmt --stdin toml)" | tee -a "${GITHUB_ENV}"
      - uses: jdx/mise-action@v4
        with: { mise_toml: "${{ env.MISE_TOML }}" }
      - run: dprint check
      - run: cargo lint
      - run: cargo test

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      - name: create github release
        uses: taiki-e/create-gh-release-action@v1
        with: { token: "${{ github.token }}", changelog: CHANGELOG.md, draft: true, branch: master }

      - name: append GitHub auto-generated notes
        # release:published never fires for token-created releases, so we
        # assemble the final body here.
        env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
        run: |
          set -euo pipefail
          our_body="$(gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" --json body --jq .body)"
          gen_body="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" --jq .body)"
          combined="$(mktemp)"
          printf '%s\n\n%s\n' "${our_body}" "${gen_body}" >"${combined}"
          gh release edit "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" --notes-file "${combined}"
          rm -f "${combined}"

  man:
    name: man pages
    needs: [verify, create-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo man --output man
      - name: archive and upload to release
        run: |
          set -euo pipefail
          archive="runner-${RELEASE_TAG}-man.tar.gz"
          tar -C man -czf "${archive}" .
          sha256sum "${archive}" >"runner-${RELEASE_TAG}-man.sha256"
          gh release upload "${RELEASE_TAG}" "${archive}" "runner-${RELEASE_TAG}-man.sha256" --clobber
      - uses: actions/upload-artifact@v7
        with: { name: man-pages, path: man/, if-no-files-found: error, retention-days: 14 }

  matrix:
    name: build matrix
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read }
    outputs: { include: "${{ steps.gen.outputs.include }}" }
    steps:
      - uses: actions/checkout@v7
        with: { sparse-checkout: npm/targets.json, sparse-checkout-cone-mode: false, persist-credentials: false }

      - id: gen
        # `target: .rust` is mandatory — taiki-e and build-packages.ts both
        # derive the asset filename `runner-<tag>-<rust>.tar.gz` from it.
        # `vm`-typed targets need a dedicated job; filtered out here.
        run: |
          include=$(jq -c '[.targets[] | select(.build != "vm") | {
            target: .rust,
            runner: .runner,
            "build-tool": .build,
            experimental: (.experimental // false)
          }]' npm/targets.json)
          echo "include=${include}" >> "${GITHUB_OUTPUT}"

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: [matrix, create-release]
    runs-on: ${{ matrix.runner }}
    permissions: { contents: write }
    strategy: { fail-fast: false, matrix: { include: "${{ fromJSON(needs.matrix.outputs.include) }}" } }
    continue-on-error: ${{ matrix.experimental }}
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      # Toolchain MUST land before setup-cross-toolchain-action (it calls
      # rustup against whatever's active). Tier-3 floats on nightly because
      # `experimental: true` + `continue-on-error` absorbs regressions.
      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@nightly
        with: { components: rust-src }

      # Tier-2 BSD + tier-3: installs the cross C toolchain and exports
      # CARGO_TARGET_*_LINKER so host cargo can link the target.
      - name: setup cross toolchain
        if: contains(fromJSON('["cargo-cross-toolchain", "cargo-build-std"]'), matrix.build-tool)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with: { target: "${{ matrix.target }}" }

      - name: build and upload binaries (taiki-e)
        if: contains(fromJSON('["cargo", "cross", "cargo-cross-toolchain"]'), matrix.build-tool)
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          token: ${{ github.token }}
          bin: runner,run
          target: ${{ matrix.target }}
          # Our `cargo-cross-toolchain` is host cargo with a pre-set linker.
          build-tool: ${{ case(matrix.build-tool == 'cargo-cross-toolchain', 'cargo', matrix.build-tool) }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true

      # Tier-3: build/archive/upload manually since upload-rust-binary-action
      # can't inject `-Z build-std`.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env: { TARGET: "${{ matrix.target }}" }
        run: cargo +nightly build-std --target "${TARGET}"

      - name: package and upload (cargo-build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ matrix.target }}
          BIN_DIR: ${{ github.workspace }}/target/${{ matrix.target }}/release
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/package-release-asset.sh"

      # A leg can report success while uploading nothing (observed: taiki-e
      # action no-ops on windows-11-arm). Fail loudly here so the empty leg
      # goes red at the source instead of ENOENT-ing later in build-dist.
      - name: verify asset uploaded
        env: { GH_TOKEN: "${{ github.token }}", TARGET: "${{ matrix.target }}" }
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/verify-asset-uploaded.sh"

  build-dist:
    name: build dist
    needs: [upload-assets, man]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write } # contents: write — drafts are invisible to read-only tokens.
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      - uses: actions/setup-node@v6
        with: { node-version: latest }

      - name: download release archives
        env: { GH_TOKEN: "${{ github.token }}" }
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/download-release-archives.sh"

      - name: download man pages
        uses: actions/download-artifact@v8
        with: { name: man-pages, path: man }

      - name: verify checksums
        working-directory: npm/downloads
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/verify-checksum.sh"

      - name: build npm packages
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/build-npm-packages.sh"

      - name: add bin dir to path
        run: echo "${GITHUB_WORKSPACE}/npm/dist/linux-x64-gnu/bin" >> "${GITHUB_PATH}"

      # Only target executable on ubuntu-latest; others exercised at install.
      - name: smoke-test packaged linux-x64-gnu binary
        shell: pwsh
        run: "& (gcm runner -CommandType Application).Path --version"

      - name: upload npm/dist artifact
        uses: actions/upload-artifact@v7
        with: { name: dist, path: npm/dist/, retention-days: 14, if-no-files-found: error }

  # Flip draft→published once binaries + dist are in place.
  publish-release:
    name: publish github release
    needs: [build-dist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps: [run: 'gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false']

  call-npm-release:
    name: npm publish
    needs: [publish-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read, id-token: write, actions: read }
    uses: ./.github/workflows/npm-release.yml
    with: { tag: "${{ github.ref_name }}", run-id: "${{ github.run_id }}" }
    secrets: inherit

  call-aur-release:
    name: aur publish
    needs: [publish-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read }
    uses: ./.github/workflows/aur-release.yml
    with: { tag: "${{ github.ref_name }}" }
    secrets: inherit

  call-crates-release:
    name: crates publish
    needs: [publish-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read, id-token: write }
    uses: ./.github/workflows/crates-release.yml
    with: { tag: "${{ github.ref_name }}" }
