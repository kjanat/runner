name: release
run-name: >-
  ${{ case(
      github.event_name == 'pull_request',
        format('verify PR #{0}', github.event.pull_request.number),
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'),
        format('release {0}', github.ref_name),
      format('verify {0}', github.ref_name)
    ) }}
on: { pull_request: null, push: { branches: [master], tags: [v*] } }
permissions: { contents: read }
env: { CARGO_TERM_COLOR: always }

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with: { save-if: "${{ github.event_name != 'pull_request' }}" }
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D clippy::all
      - run: cargo test

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      - name: create github release
        uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1.11.0
        with:
          token: ${{ github.token }}
          changelog: CHANGELOG.md
          draft: true
          branch: master

      - name: append GitHub auto-generated notes
        # release:published never fires for token-created releases, so we
        # assemble the final body here.
        env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
        run: |
          set -euo pipefail
          our_body="$(gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" --json body --jq .body)"
          gen_body="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" --jq .body)"
          combined="$(mktemp)"
          printf '%s\n\n%s\n' "${our_body}" "${gen_body}" >"${combined}"
          gh release edit "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" --notes-file "${combined}"
          rm -f "${combined}"

  man:
    name: man pages
    needs: [verify, create-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo run --quiet --features man -- man --output man
      - name: archive and upload to release
        run: |
          set -euo pipefail
          archive="runner-${RELEASE_TAG}-man.tar.gz"
          tar -C man -czf "${archive}" .
          sha256sum "${archive}" >"runner-${RELEASE_TAG}-man.sha256"
          gh release upload "${RELEASE_TAG}" \
            "${archive}" "runner-${RELEASE_TAG}-man.sha256" --clobber
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: man-pages, path: man/, if-no-files-found: error, retention-days: 14 }

  matrix:
    name: build matrix
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read }
    outputs: { include: "${{ steps.gen.outputs.include }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: npm/targets.json
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: gen
        # `target: .rust` is mandatory — taiki-e and build-packages.ts both
        # derive the asset filename `runner-<tag>-<rust>.tar.gz` from it.
        # `vm`-typed targets need a dedicated job; filtered out here.
        run: |
          include=$(jq -c '[.targets[] | select(.build != "vm") | {
            target: .rust,
            runner: .runner,
            "build-tool": .build,
            experimental: (.experimental // false)
          }]' npm/targets.json)
          echo "include=${include}" >> "${GITHUB_OUTPUT}"

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: [matrix, create-release]
    runs-on: ${{ matrix.runner }}
    permissions: { contents: write }
    strategy: { fail-fast: false, matrix: { include: "${{ fromJSON(needs.matrix.outputs.include) }}" } }
    continue-on-error: ${{ matrix.experimental }}
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      # Toolchain MUST land before setup-cross-toolchain-action (it calls
      # rustup against whatever's active). Tier-3 floats on nightly because
      # `experimental: true` + `continue-on-error` absorbs regressions.
      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with: { targets: "${{ matrix.target }}" }

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }

      # Tier-2 BSD + tier-3: installs the cross C toolchain and exports
      # CARGO_TARGET_*_LINKER so host cargo can link the target.
      - name: setup cross toolchain
        if: contains(fromJSON('["cargo-cross-toolchain", "cargo-build-std"]'), matrix.build-tool)
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with: { target: "${{ matrix.target }}" }

      - name: build and upload binaries (taiki-e)
        if: contains(fromJSON('["cargo", "cross", "cargo-cross-toolchain"]'), matrix.build-tool)
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          token: ${{ github.token }}
          bin: runner,run
          target: ${{ matrix.target }}
          # Our `cargo-cross-toolchain` is host cargo with a pre-set linker.
          build-tool: ${{ case(matrix.build-tool == 'cargo-cross-toolchain', 'cargo', matrix.build-tool) }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true

      # Tier-3: build/archive/upload manually since upload-rust-binary-action
      # can't inject `-Z build-std`.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env: { CARGO_UNSTABLE_BUILD_STD: std, panic_abort }
        run: |
          cargo +nightly build \
            --release --locked \
            --bin runner --bin run \
            --target "${{ matrix.target }}"

      - name: package and upload (cargo-build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ matrix.target }}
          BIN_DIR: ${{ github.workspace }}/target/${{ matrix.target }}/release
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/package-release-asset.sh"

  build-dist:
    name: build dist
    needs: [upload-assets, man]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # contents: write — drafts are invisible to read-only tokens.
    permissions: { contents: write }
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: latest }

      - name: download release archives
        env: { GH_TOKEN: "${{ github.token }}" }
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/download-release-archives.sh"

      - name: download man pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: man-pages, path: man }

      - name: verify checksums
        working-directory: npm/downloads
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/verify-checksum.sh"

      - name: build npm packages
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/build-npm-packages.sh"

      - name: add bin dir to path
        run: echo "${GITHUB_WORKSPACE}/npm/dist/linux-x64-gnu/bin" >> "${GITHUB_PATH}"

      # Only target executable on ubuntu-latest; others exercised at install.
      - name: smoke-test packaged linux-x64-gnu binary
        shell: pwsh
        run: "& (gcm runner -CommandType Application).Path --version"

      - name: upload npm/dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: npm-dist, path: npm/dist/, retention-days: 14, if-no-files-found: error }

  # Flip draft→published once binaries + npm-dist are in place.
  publish-release:
    name: publish github release
    needs: [build-dist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps: [{ run: 'gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false' }]

  call-npm-release:
    name: npm publish
    needs: [publish-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read, id-token: write, actions: read }
    uses: ./.github/workflows/npm-release.yml
    with: { tag: "${{ github.ref_name }}", run-id: "${{ github.run_id }}" }
    secrets: inherit

  call-aur-release:
    name: aur publish
    needs: [publish-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read }
    uses: ./.github/workflows/aur-release.yml
    with: { tag: "${{ github.ref_name }}" }
    secrets: inherit
