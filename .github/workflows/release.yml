name: release
run-name: "${{ case(github.event_name == 'pull_request', format('verify PR {0}{1}', '#', github.event.pull_request.number), github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'), format('release {0}', github.ref_name), format('verify {0}', github.ref_name)) }}"
on: { pull_request: null, push: { branches: [master], tags: [v*] } }
permissions: { contents: read }
env: { CARGO_TERM_COLOR: always }

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with: { save-if: "${{ github.event_name != 'pull_request' }}" }
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D clippy::all
      - run: cargo test

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      - name: create github release
        uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1.11.0
        with: { token: "${{ github.token }}", changelog: CHANGELOG.md, draft: true, branch: master }

      - name: append GitHub auto-generated notes
        # release:published never fires for token-created releases, so we
        # assemble the final body here.
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          retries: 3
          script: |
            const { default: appendGeneratedReleaseNotes } = await import("${{ github.workspace }}/.github/scripts/release/notes.mjs");
            await appendGeneratedReleaseNotes({ core, github, context });

  man:
    name: man pages
    needs: [verify, create-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo run --quiet --features man -- man --output man
      - name: archive and upload to release
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: archiveManPages } = await import("${{ github.workspace }}/.github/scripts/build/man-archive.mjs");
            await archiveManPages({ core, exec });
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: man-pages, path: man/, if-no-files-found: error, retention-days: 14 }

  matrix:
    name: build matrix
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: read }
    outputs: { include: "${{ steps.gen.outputs.include }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { sparse-checkout: npm/targets.json, sparse-checkout-cone-mode: false, persist-credentials: false }

      - id: gen
        # `target: .rust` is mandatory — taiki-e and build-packages.ts both
        # derive the asset filename `runner-<tag>-<rust>.tar.gz` from it.
        # `vm`-typed targets need a dedicated job; filtered out here.
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { readFile } = await import('node:fs/promises');

            const { targets } = JSON.parse(await readFile('npm/targets.json', 'utf8'));
            const include = targets
              .filter(({ build }) => build !== 'vm')
              .map((target) => ({
                target: target.rust,
                runner: target.runner,
                'build-tool': target.build,
                experimental: target.experimental ?? false,
              }));

            core.setOutput('include', JSON.stringify(include));
            await core.summary.addHeading('Build matrix').addRaw(`Generated ${include.length} release build targets.`).write();

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: [matrix, create-release]
    runs-on: ${{ matrix.runner }}
    permissions: { contents: write }
    strategy: { fail-fast: false, matrix: { include: "${{ fromJSON(needs.matrix.outputs.include) }}" } }
    continue-on-error: ${{ matrix.experimental }}
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      # Toolchain MUST land before setup-cross-toolchain-action (it calls
      # rustup against whatever's active). Tier-3 floats on nightly because
      # `experimental: true` + `continue-on-error` absorbs regressions.
      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with: { targets: "${{ matrix.target }}" }

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }

      # Tier-2 BSD + tier-3: installs the cross C toolchain and exports
      # CARGO_TARGET_*_LINKER so host cargo can link the target.
      - name: setup cross toolchain
        if: contains(fromJSON('["cargo-cross-toolchain", "cargo-build-std"]'), matrix.build-tool)
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with: { target: "${{ matrix.target }}" }

      - name: build and upload binaries (taiki-e)
        if: contains(fromJSON('["cargo", "cross", "cargo-cross-toolchain"]'), matrix.build-tool)
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          token: ${{ github.token }}
          bin: runner,run
          target: ${{ matrix.target }}
          # Our `cargo-cross-toolchain` is host cargo with a pre-set linker.
          build-tool: ${{ case(matrix.build-tool == 'cargo-cross-toolchain', 'cargo', matrix.build-tool) }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true

      # Tier-3: build/archive/upload manually since upload-rust-binary-action can't inject `-Z build-std`.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env: { CARGO_UNSTABLE_BUILD_STD: "std, panic_abort", T: "${{ matrix.target }}" }
        run: cargo +nightly build --release --locked --bin runner --bin run --target "${T}"

      - name: package and upload (cargo-build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env: { GH_TOKEN: "${{ github.token }}", TARGET: "${{ matrix.target }}", BIN_DIR: "${{ github.workspace }}/target/${{ matrix.target }}/release" }
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: packageReleaseAsset } = await import("${{ github.workspace }}/.github/scripts/build/package-release-asset.mjs");
            await packageReleaseAsset({ core, exec });

  build-npm-dist:
    name: build npm dist
    needs: [upload-assets, man]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # contents: write — drafts are invisible to read-only tokens.
    permissions: { contents: write }
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version-file: .node-version }

      - name: download release archives
        env: { GH_TOKEN: "${{ github.token }}" }
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: downloadReleaseArchives } = await import("${{ github.workspace }}/.github/scripts/build/download-release-archives.mjs");
            await downloadReleaseArchives({ core, context, exec });

      - name: download man pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: man-pages, path: man }

      - name: verify checksums
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: verifyChecksums } = await import("${{ github.workspace }}/.github/scripts/build/verify-checksum.mjs");
            await verifyChecksums({ core });

      - name: build npm packages
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { default: buildNpmPackages } = await import("${{ github.workspace }}/.github/scripts/build/npm.mjs");
            await buildNpmPackages({ core, context, exec });

      - name: smoke-test packaged linux-x64-gnu binary
        # Only target executable on ubuntu-latest; others exercised at install.
        run: |
          set -euo pipefail
          bin="${GITHUB_WORKSPACE}/npm/dist/linux-x64-gnu/bin/runner"
          if [[ ! -x "${bin}" ]]; then
            echo "error: ${bin} missing or not executable" >&2
            exit 1
          fi
          "${bin}" --version

      - name: upload npm/dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: npm-dist, path: npm/dist/, retention-days: 14, if-no-files-found: error }

  # Flip draft→published once binaries + npm-dist are in place. Releases
  # published with GITHUB_TOKEN do not emit downstream release:published
  # workflow runs, so explicitly dispatch package publishers afterward.
  publish-release:
    name: publish github release
    needs: [build-npm-dist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { actions: write, contents: write }
    steps:
      - name: publish github release
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          retries: 3
          script: |
            const { publishGithubRelease } = await import("${{ github.workspace }}/.github/scripts/release/publish.mjs");
            await publishGithubRelease({ core, github, context });

      - name: dispatch package publishes
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          retries: 3
          script: |
            const { dispatchPackagePublishes } = await import("${{ github.workspace }}/.github/scripts/release/publish.mjs");
            await dispatchPackagePublishes({ core, github, context });
