name: release
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('verify PR #{0}', github.event.pull_request.number)
      || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      && format('release {0}', github.ref_name)
      || format('verify {0}', github.ref_name) }}

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D clippy::all

      - name: cargo test
        run: cargo test

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: create github release
        uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          changelog: CHANGELOG.md
          draft: true
          branch: master

  matrix:
    name: build matrix
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: npm/targets.json
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: gen
        # Single source of truth: npm/targets.json. Each entry maps to the
        # fields upload-assets consumes. `vm` targets (OpenBSD) are filtered
        # out — they're built by the dedicated upload-openbsd job because the
        # build runs inside a VM that taiki-e/upload-rust-binary-action can't
        # reach. Missing `experimental` coerces to false so `continue-on-error`
        # evaluates cleanly.
        run: |
          include=$(jq -c '[.targets[] | select(.build != "vm") | {
            target: .rust,
            runner: .runner,
            "build-tool": .build,
            experimental: (.experimental // false)
          }]' npm/targets.json)
          echo "include=${include}" >> "${GITHUB_OUTPUT}"

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: [matrix, create-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}
    continue-on-error: ${{ matrix.experimental == true }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      # Rust toolchain has to land BEFORE setup-cross-toolchain-action: the
      # latter calls rustup against whatever's active. Tier-2 paths use
      # stable; tier-3 paths float on `nightly` because pinning to a snapshot
      # rots — and these targets are `experimental: true`, so a transient
      # nightly regression is absorbed by `continue-on-error` rather than
      # blocking the release.
      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # Tier-2 BSD targets where Rust ships prebuilt std but `cross` has no
      # working docker image. setup-cross-toolchain-action installs the
      # matching cross C toolchain (e.g. x86_64-unknown-netbsd-gcc) and
      # exports CARGO_TARGET_*_LINKER so host `cargo` builds work. Tier-3
      # `cargo-build-std` reuses the same C toolchain step but goes the
      # nightly + -Z build-std route to construct std locally.
      - name: setup cross toolchain
        if: matrix.build-tool == 'cargo-cross-toolchain' || matrix.build-tool == 'cargo-build-std'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: build and upload binaries (taiki-e)
        if: matrix.build-tool == 'cargo' || matrix.build-tool == 'cross' || matrix.build-tool == 'cargo-cross-toolchain'
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bin: runner,run
          target: ${{ matrix.target }}
          # Map our extended enum onto values upload-rust-binary-action accepts.
          # `cargo-cross-toolchain` builds with host cargo (the toolchain step
          # above already configured it), so `cargo` is the right value here.
          build-tool: ${{ matrix.build-tool == 'cargo-cross-toolchain' && 'cargo' || matrix.build-tool }}
          archive: runner-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true

      # Tier-3 path: upload-rust-binary-action can't inject `-Z build-std`,
      # so we build, archive, and upload manually. The CARGO_UNSTABLE_BUILD_STD
      # env honors the same shape as `-Z build-std=...` on the cargo CLI.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env:
          CARGO_UNSTABLE_BUILD_STD: std,panic_abort
        run: |
          cargo +nightly build \
            --release --locked \
            --bin runner --bin run \
            --target "${{ matrix.target }}"

      - name: package and upload (cargo-build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
          BIN_DIR: ${{ github.workspace }}/target/${{ matrix.target }}/release
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/package-release-asset.sh"

  upload-openbsd:
    name: build+upload x86_64-unknown-openbsd
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    # Tier-3, treated like other `experimental: true` matrix entries — a
    # transient VM hiccup shouldn't tank the whole release.
    continue-on-error: true
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      OPENBSD_VERSION: "7.8"
      TARGET: x86_64-unknown-openbsd
    steps:
      - uses: actions/checkout@v6

      # Native build inside an OpenBSD VM. cross-compiling OpenBSD from
      # Linux isn't viable: setup-cross-toolchain-action excludes OpenBSD
      # and Rust ships no prebuilt std for it (tier 3). The VM gives us a
      # real OpenBSD host whose `pkg_add rust` provides a working toolchain.
      # Default `sync_files: true` is bidirectional, so the binaries we
      # stage to ./openbsd-out inside the VM appear back on the host runner.
      - name: build inside OpenBSD VM
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: openbsd
          version: ${{ env.OPENBSD_VERSION }}
          shell: bash
          run: |
            set -euo pipefail
            # OpenBSD 7.8 ships rust-1.90 in pkg, but the project's MSRV
            # is 1.95 (Cargo.toml). pkg_add would fail at rustc invocation,
            # so install via rustup-init.sh instead. OpenBSD is tier-3 in
            # rustup so the script falls through to a community mirror.
            # `--profile minimal` skips docs/clippy/rustfmt for faster
            # install under QEMU; the build doesn't need them.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --profile minimal --default-toolchain stable
            # Each `run:` block executes in a fresh non-login shell — no
            # ~/.profile sourcing — so cargo isn't on PATH unless we add
            # it explicitly here.
            . "$HOME/.cargo/env"
            cargo build --release --locked --bin runner --bin run
            # Stage outside `target/` so the file copy back to the host
            # below has a stable, predictable path.
            mkdir -p ./openbsd-out
            cp target/release/runner target/release/run ./openbsd-out/

      - name: package and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIN_DIR: ${{ github.workspace }}/openbsd-out
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/package-release-asset.sh"

  build-npm-dist:
    name: build npm dist
    needs: [upload-assets, upload-openbsd]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Need write so `gh release download` can see the still-draft release;
    # drafts are invisible to read-only tokens, which surfaces as the
    # misleading "release not found" error we hit on v0.6.0.
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with: { persist-credentials: false }

      - uses: actions/setup-node@v6
        with: { node-version: latest }

      - name: download release archives
        env: { GH_TOKEN: "${{ github.token }}" }
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/download-release-archives.sh"

      - name: verify checksums
        working-directory: npm/downloads
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/verify-checksum.sh"

      - name: build npm packages
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/build/build-npm-packages.sh"

      - name: smoke-test packaged linux-x64-gnu binary
        # Sanity-check that the binary we just packaged actually runs
        # before we upload it for the publish job. linux-x64-gnu is the
        # only target executable on ubuntu-latest; cross-target binaries
        # are exercised by the publish job's install-time checks.
        run: |
          set -euo pipefail
          bin="${GITHUB_WORKSPACE}/npm/dist/linux-x64-gnu/bin/runner"
          if [[ ! -x "${bin}" ]]; then
            echo "error: ${bin} missing or not executable" >&2
            exit 1
          fi
          "${bin}" --version

      - name: upload npm/dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-dist
          path: npm/dist/
          retention-days: 7
          if-no-files-found: error
