---
name: crates-release
run-name: ${{ format('crates publish {0}', inputs.tag) }}

on:
  workflow_call: { inputs: { tag: { required: true, type: string }, run-id: { required: false, type: string, default: "" } } }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. vX.Y.Z), required: true, type: string }
      run-id: { description: release.yml run ID with a man-pages artifact; empty rebuilds them, required: false, default: "", type: string }
      dry-run: { description: Dry run only (no upload to crates.io), required: false, default: false, type: boolean }

env:
  RELEASE_TAG: ${{ inputs.tag }}
  INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write, actions: read }
    environment: { name: crates-io, url: "${{ steps.verify.outputs.url }}" }
    steps:
      - uses: actions/checkout@v7
        with: { ref: "refs/tags/${{ env.RELEASE_TAG }}", persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: verify tag matches Cargo.toml version
        id: verify
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          manifest_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "runner-run") | .version')
          if [[ "${tag_version}" != "${manifest_version}" ]]; then
            echo "::error file=Cargo.toml::version does not match release tag"
            echo "error: tag ${RELEASE_TAG} (${tag_version}) does not match Cargo.toml version ${manifest_version}" >&2
            exit 1
          fi
          echo "ok: tag ${RELEASE_TAG} matches Cargo.toml version ${manifest_version}"
          echo "url=https://crates.io/crates/runner-run/${manifest_version}" >> "$GITHUB_OUTPUT"

      - name: download man pages
        if: inputs.run-id != ''
        uses: actions/download-artifact@v8
        with: { name: man-pages, path: man, run-id: "${{ inputs.run-id }}", github-token: "${{ github.token }}" }

      - name: build man pages
        if: inputs.run-id == ''
        run: cargo man --output man

      - run: cargo dirtypub --dry-run

      - name: mint crates.io token (trusted publishing)
        uses: rust-lang/crates-io-auth-action@v1
        if: env.INPUT_DRY_RUN != 'true'
        id: auth

      - name: cargo publish
        if: env.INPUT_DRY_RUN != 'true'
        env: { CARGO_REGISTRY_TOKEN: "${{ steps.auth.outputs.token }}" }
        run: cargo dirtypub
