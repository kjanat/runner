name: crates-release
run-name: >-
  ${{ github.event_name == 'release'
      && format('crates publish {0}', github.event.release.tag_name)
      || format('crates publish {0}', inputs.tag) }}

# Publishes the runner-run crate to crates.io when a maintainer publishes
# a GitHub release (release.yml creates the release as a draft, so this
# fires only after a human reviews and clicks publish), or on manual
# dispatch. Avoids `workflow_run` to sidestep the CodeQL "untrusted code
# in a privileged context" pattern: that trigger runs with secrets while
# checking out a tag-controlled ref, which would let a malicious build.rs
# in a tag exfiltrate CARGO_REGISTRY_TOKEN. Here, the human gate on
# publishing the draft release plus the `crates-io` environment's
# required reviewers are the trust anchors.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.6.0)
        required: true
        type: string
      dry-run:
        description: Dry run only (no upload to crates.io)
        required: false
        default: "false"
        type: choice
        options:
          - true
          - false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: crates-io
      url: https://crates.io/crates/runner-run
    env:
      # RELEASE_TAG comes from trusted trigger metadata only — for `release`
      # events the tag is set at release-creation time by release.yml, and
      # for `workflow_dispatch` the maintainer typed it.
      RELEASE_TAG: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.tag
            || github.event.release.tag_name }}
      INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
    steps:
      # Check out the tag the release was cut from so the published artifact
      # matches the GitHub release exactly. Trust model: a maintainer
      # explicitly published this release (or dispatched the workflow), so
      # running build.rs from this ref is intentional.
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2

      - name: verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          manifest_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "runner-run") | .version')
          if [[ "${tag_version}" != "${manifest_version}" ]]; then
            echo "error: tag ${RELEASE_TAG} (${tag_version}) does not match Cargo.toml version ${manifest_version}" >&2
            exit 1
          fi
          echo "ok: tag ${RELEASE_TAG} matches Cargo.toml version ${manifest_version}"

      - name: cargo publish (dry-run verification)
        run: cargo publish --locked --dry-run

      - name: cargo publish
        if: env.INPUT_DRY_RUN != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
