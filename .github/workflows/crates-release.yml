name: crates-release
run-name: >-
  ${{ github.event_name == 'workflow_run'
      && format('crates publish {0}', github.event.workflow_run.head_branch)
      || format('crates publish {0}', inputs.tag) }}

# Publishes the runner-run crate to crates.io after a successful tag-triggered
# release.yml run, or on manual dispatch. Mirrors the npm-release.yml shape:
# trusted scripts only (sparse-checkout from the default branch), explicit
# RELEASE_TAG sourced from trigger metadata, dry-run support for verification.

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.6.0)
        required: true
        type: string
      dry-run:
        description: Dry run only (no upload to crates.io)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Only run after a successful tag-triggered release.yml, or on manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
    environment:
      name: crates-io
      url: https://crates.io/crates/runner-run
    env:
      # RELEASE_TAG comes from trusted trigger metadata only — never from
      # anything build-time scripts could influence.
      RELEASE_TAG: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.tag
            || github.event.workflow_run.head_branch }}
      INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
    steps:
      # Check out the tag the release was cut from so the published artifact
      # matches the GitHub release. Pulls the trusted ref (the tag itself is
      # protected by the release workflow's validation steps).
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2

      - name: verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          manifest_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "runner-run") | .version')
          if [[ "${tag_version}" != "${manifest_version}" ]]; then
            echo "error: tag ${RELEASE_TAG} (${tag_version}) does not match Cargo.toml version ${manifest_version}" >&2
            exit 1
          fi
          echo "ok: tag ${RELEASE_TAG} matches Cargo.toml version ${manifest_version}"

      - name: cargo publish (dry-run verification)
        run: cargo publish --locked --dry-run

      - name: cargo publish
        if: env.INPUT_DRY_RUN != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
